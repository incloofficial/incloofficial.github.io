<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - INCLO</title>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  background:#111;
  font-family:sans-serif;
  color:#fff;
  text-align:center;
  padding:30px;
  overflow-x:hidden;
}

/* ================= FRONT LAYER ================= */
.card, h1, h2, h3, p, button, a, img{
  position:relative;
  z-index:1;
}

/* ================= BACKGROUND LOGO ================= */
body::before{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:500px;
  height:500px;
  transform:translate(-50%,-50%);
  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;
  opacity:0.22;
  pointer-events:none;
  z-index:0;
  animation: floatLogo 3.5s ease-in-out infinite;
}

/* ================= GLOW ================= */
body::after{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:520px;
  height:520px;
  transform:translate(-50%,-50%);
  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;
  opacity:0.10;
  filter: blur(18px);
  pointer-events:none;
  z-index:0;
  animation: glowPulse 3.5s ease-in-out infinite;
}

/* ================= ANIMATION ================= */
@keyframes floatLogo {
  0% {transform:translate(-50%,-50%) scale(1.75);}
  50% {transform:translate(-50%,-55%) scale(2.2);}
  100% {transform:translate(-50%,-50%) scale(1.75);}
}

@keyframes glowPulse {
  0% {opacity:0.05;}
  50% {opacity:0.12;}
  100% {opacity:0.05;}
}

/* ================= UI ================= */
.card{
  background:#222;
  padding:20px;
  border-radius:10px;
  max-width:400px;
  margin:auto;
}

h2{
  margin-bottom:20px;
}

.btn{
  display:block;
  width:100%;
  padding:12px;
  background:#fff;
  color:#111;
  border:none;
  font-weight:bold;
  margin-top:15px;
  cursor:pointer;
}

.qr{
  width:100%;
  border-radius:10px;
  margin:15px 0;
}

</style>
</head>

<body>

<h2>PAYMENT</h2>

<div class="card">

  <p>scan QRIS:</p>
  <img class="qr" src="no_markReactNative-snapshot-image_0.png" alt="QRIS">

  <button class="btn" onclick="finishOrder()">
    KONFIRMASI ORDER
  </button>

</div>

<script>
function finishOrder(){
  alert("Order berhasil dibuat!");
  window.location.href = "index.html";
}
</script>

</body>
</html>
