<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - INCLO</title>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  background:#111;
  font-family:sans-serif;
  color:#fff;
  text-align:center;
  padding:30px;
  overflow-x:hidden;
}

/* ================= FRONT LAYER ================= */
.card, h1, h2, h3, p, button, a, img{
  position:relative;
  z-index:1;
}

/* ================= BACKGROUND LOGO ================= */
body::before{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:500px;
  height:500px;
  transform:translate(-50%,-50%);
  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;
  opacity:0.22;
  pointer-events:none;
  z-index:0;
  animation: floatLogo 3.5s ease-in-out infinite;
}

/* ================= GLOW ================= */
body::after{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:520px;
  height:520px;
  transform:translate(-50%,-50%);
  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;
  opacity:0.10;
  filter: blur(18px);
  pointer-events:none;
  z-index:0;
  animation: glowPulse 3.5s ease-in-out infinite;
}

/* ================= ANIMATION ================= */
@keyframes floatLogo {
  0% {transform:translate(-50%,-50%) scale(1.75);}
  50% {transform:translate(-50%,-55%) scale(2.5);}
  100% {transform:translate(-50%,-50%) scale(1.75);}
}

@keyframes glowPulse {
  0% {opacity:0.05;}
  50% {opacity:0.12;}
  100% {opacity:0.05;}
}

/* ================= UI ================= */
.card{
  background:#222;
  padding:20px;
  border-radius:10px;
  max-width:400px;
  margin:auto;
}

h2{
  margin-bottom:20px;
}

.btn{
  display:block;
  width:100%;
  padding:12px;
  background:#fff;
  color:#111;
  border:none;
  font-weight:bold;
  margin-top:15px;
  cursor:pointer;
  text-decoration:none;
}

.qr{
  width:100%;
  border-radius:10px;
  margin:15px 0;
}
  .title{
  font-size:32px;
  letter-spacing:2px;
  margin-bottom:5px;
}
  .title{
  text-shadow:0 0 15px rgba(255,255,255,0.1);
  }

.subtitle{
  font-size:13px;
  opacity:0.6;
  margin-bottom:20px;
}

/* info box biar rapi */
#info{
  text-align:left;
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
  line-height:1.6;
}

/* QR lebih premium */
.qr{
  width:100%;
  max-height:320px;
  object-fit:contain;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* tombol lebih mahal */
.btn{
  background:#fff;
  color:#111;
  border-radius:8px;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.03);
}
  .info-box{
  text-align:left;
  background:rgba(255,255,255,0.06);
  padding:15px;
  border-radius:12px;
  margin-top:15px;
  line-height:1.6;
  font-size:13px;
  letter-spacing:0.5px;
}

.info-box p{
  margin:10px 0;
}

.info-box b{
  color:#fff;
  opacity:0.6;
  font-size:11px;
  letter-spacing:2px;
}

</style>
</head>

<body>

<h2 class="title">PAYMENT CONFIRMATION</h2>
<p class="subtitle">Complete your payment to process your order</p>

<div class="card">

  <p>scan QRIS:</p>
  <img class="qr" src="no_markReactNative-snapshot-image_0.png" alt="QRIS">
  
  <div id="info"></div>

  <button class="btn" onclick="finishOrder()">
    KONFIRMASI ORDER
  </button>


</div>

<script>

const params = new URLSearchParams(window.location.search);

const product = params.get("product") || "-";
const size = params.get("size") || "-";
const name = params.get("name") || "-";
const phone = params.get("phone") || "-";
const address = params.get("address") || "-";
const courier = params.get("courier") || "-";

/* tampilkan di halaman */
document.getElementById("info").innerHTML =
`
<div class="info-box">
  <p><b>PRODUCT</b><br>${product}</p>
  <p><b>SIZE</b><br>${size}</p>
  <p><b>NAME</b><br>${name}</p>
  <p><b>PHONE</b><br>${phone}</p>
  <p><b>ADDRESS</b><br>${address}</p>
  <p><b>COURIER</b><br>${courier}</p>
</div>
`;
function finishOrder(){

  const message =
`Halo admin INCLOOFFICIAL 

 KONFIRMASI ORDER

Produk: ${product}
Size: ${size}

 Nama: ${name}
 HP: ${phone}
 Alamat: ${address}
 Kurir: ${courier}

*❗Mohon kirim bukti Pembayaran❗*

_🔥Thanks for Buying🔥_`;

  const adminNumber = "6289666846125";

  window.location.href =
  `https://wa.me/${adminNumber}?text=${encodeURIComponent(message)}`;
}

</script>

</body>
</html>
