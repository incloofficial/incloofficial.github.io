<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - INCLO</title>

<style>
  body{
  margin:0;
  background:#111;
  font-family:sans-serif;
  color:#fff;
  text-align:center;
  padding:30px;
  overflow-x:hidden;
  }

/* 🔥 Biar konten tetap di atas background */
.container, nav, .card, h1, h2, h3, p, button, a {
  position:relative;
  z-index:1;
}

/* 🔥 LOGO WATERMARK UTAMA */
body::before{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:320px;
  height:320px;
  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;
  opacity:0.07;
  pointer-events:none;
  z-index:0;

  animation: floatLogo 8s ease-in-out infinite;
}

/* 🔥 GLOW HALUS PREMIUM */
body::after{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:360px;
  height:360px;
  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;
  opacity:0.03;
  filter: blur(10px);
  pointer-events:none;
  z-index:0;

  animation: glowPulse 4s ease-in-out infinite;
}

/* 🔥 ANIMASI GERAK PELAN */
@keyframes floatLogo {
  0%   { transform:translate(-50%,-50%) scale(1.75); }
  50%  { transform:translate(-50%,-52%) scale(2.5); }
  100% { transform:translate(-50%,-50%) scale(1.75); }
}

/* 🔥 PULSE GLOW */
@keyframes glowPulse {
  0%   { opacity:0.02; }
  50%  { opacity:0.06; }
  100% { opacity:0.02; }
}
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:#fff;
  text-align:center;
  padding:30px;
}

.card{
  background:#222;
  padding:20px;
  border-radius:10px;
  max-width:400px;
  margin:auto;
}

h2{
  font-family:Anton, sans-serif;
  margin-bottom:20px;
}

.btn{
  display:block;
  width:100%;
  padding:12px;
  background:#fff;
  color:#111;
  border:none;
  font-weight:bold;
  margin-top:15px;
  cursor:pointer;
}

.qr{
  width:100%;
  border-radius:10px;
  margin:15px 0;
}
</style>
</head>

<body>

<h2>PAYMENT</h2>

<div class="card">

  <p>scan QRIS:</p>
  <img class="qr" src="no_markReactNative-snapshot-image_0.png" alt="QRIS">

  <button class="btn" onclick="finishOrder()">
    KONFIRMASI ORDER
  </button>

</div>

<script>
function finishOrder(){
  alert("Order berhasil dibuat!");
  window.location.href = "index.html";
}
</script>

</body>
</html>
