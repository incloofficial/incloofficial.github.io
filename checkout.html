<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - INCLO</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#111;
  color:#fff;
}

.container{
  max-width:400px;
  margin:auto;
  padding:30px 20px;
}

h1{
  font-family:'Anton';
  margin-bottom:20px;
  text-align:center;
}

.card{
  background:#222;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
  text-align:center;
}

input, select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:12px;
  background:#fff;
  color:#111;
  border:none;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>CHECKOUT</h1>

<div class="card">
  <h3 id="productName"></h3>
  <p id="productPrice"></p>
<img id="productImage" style="width:100%;border-radius:10px;margin-bottom:15px;">
</div>

<form action="https://formspree.io/f/xqewjggw" method="POST">

  <input type="hidden" name="product" id="formProduct">
  <input type="hidden" name="price" id="formPrice">

  <input type="text" name="name" placeholder="Nama Lengkap" required>
  <input type="text" name="phone" placeholder="No HP" required>
  <input type="text" name="address" placeholder="Alamat Lengkap" required>

  <select name="size" required>
    <option value="">Pilih Size</option>
    <option>S</option>
    <option>M</option>
    <option>L</option>
    <option>XL</option>
  </select>

  <button type="submit">ORDER SEKARANG</button>

</form>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const product = params.get("product");
const price = params.get("price");

document.getElementById("productName").innerText = product;
document.getElementById("productPrice").innerText = "Rp" + price;

document.getElementById("formProduct").value = product;
document.getElementById("formPrice").value = price;
</script>

</body>
</html>
