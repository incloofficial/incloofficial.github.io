<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - INCLO</title>

<style>
body{font-family:sans-serif;background:#111;color:#fff;}
.container{max-width:400px;margin:auto;padding:30px 20px;text-align:center;}
img{width:100%;border-radius:10px;margin-bottom:15px;}
button{width:100%;padding:12px;background:#fff;color:#111;border:none;font-weight:bold;}
.card{background:#222;padding:15px;border-radius:10px;margin-bottom:20px;}
</style>
</head>

<body>

<div class="container">

<h2>CHECKOUT</h2>

<img id="productImage">

<div class="card">
  <h3 id="productName"></h3>
  <p id="productPrice"></p>
</div>

<button onclick="goShipping()">LANJUT SHIPPING</button>

</div>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("productName").innerText = params.get("product");
document.getElementById("productPrice").innerText = "Rp" + params.get("price");
document.getElementById("productImage").src = params.get("img");

function goShipping(){
  window.location.href = "shipping.html" +
  "?product=" + params.get("product") +
  "&price=" + params.get("price") +
  "&img=" + params.get("img");
}
</script>

</body>
</html>
