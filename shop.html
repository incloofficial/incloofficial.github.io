<div class="product-card">

  <div class="slider">
    <div class="slides">
      <img class="slide" src="1777183184183.png">
      <img class="slide" src="169445691b6ea8319eb0d0ae2e6ecc63_2.png">
      <img class="slide" src="23c27c529ae261b71b5e2ab097be7f8f_5.png">
    </div>

    <button class="prev">❮</button>
    <button class="next">❯</button>
  </div>

  <div class="product-info">
    <h3>T-SHIRT FVCK STUPID POOR</h3>
    <p>Rp110.000</p>

    <!-- 🔥 INI YANG SUDAH FIX FLOW BARU -->
    <a href="shipping.html?product=T-SHIRT FVCK STUPID POOR&price=110000&img=1777183184183.png" class="btn">
      ORDER
    </a>
  </div>

</div>

</section>

<script>
document.querySelectorAll(".slider").forEach((slider)=>{
  let slides = slider.querySelector(".slides");
  let total = slider.querySelectorAll(".slide").length;
  let index = 0;

  function updateSlide(){
    slides.style.transform = `translateX(-${index * 100}%)`;
  }

  slider.querySelector(".next").onclick = ()=>{
    index = (index + 1) % total;
    updateSlide();
  };

  slider.querySelector(".prev").onclick = ()=>{
    index = (index - 1 + total) % total;
    updateSlide();
  };

  setInterval(()=>{
    index = (index + 1) % total;
    updateSlide();
  },3000);
});
</script>
