INCLO OFFICIAL<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - INCLO</title>

<style>
  body{
  margin:0;
  background:#111;
  font-family:sans-serif;
  overflow-x:hidden;
}

/* 🔥 Biar konten tetap di atas background */
.container, nav, .card, h1, h2, h3, p, button, a {
  position:relative;
  z-index:1;
}

/* 🔥 LOGO WATERMARK UTAMA */
body::before{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:320px;
  height:320px;
  background:url("file_00000000556472069d10c0af39c85682.png") no-repeat center;
  background-size:contain;
  opacity:0.07;
  pointer-events:none;
  z-index:0;

  animation: floatLogo 8s ease-in-out infinite;
}

/* 🔥 GLOW HALUS PREMIUM */
body::after{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:360px;
  height:360px;
  background:url("file_00000000556472069d10c0af39c85682.png") no-repeat center;
  background-size:contain;
  opacity:0.03;
  filter: blur(10px);
  pointer-events:none;
  z-index:0;

  animation: glowPulse 4s ease-in-out infinite;
}

/* 🔥 ANIMASI GERAK PELAN */
@keyframes floatLogo {
  0%   { transform:translate(-50%,-50%) scale(1); }
  50%  { transform:translate(-50%,-52%) scale(1.03); }
  100% { transform:translate(-50%,-50%) scale(1); }
}

/* 🔥 PULSE GLOW */
@keyframes glowPulse {
  0%   { opacity:0.02; }
  50%  { opacity:0.06; }
  100% { opacity:0.02; }
}
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:30px;
}

.card{
  background:#222;
  padding:15px;
  border-radius:10px;
  max-width:300px;
  margin:auto;
}

img{
  width:100%;
  border-radius:10px;
}

a{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:#fff;
  color:#111;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>SHOP</h2>

  <a href="shipping.html?product=T-SHIRT FVCK STUPID POOR&price=110000&img=1777183184183.png">
    ORDER
  </a>

</div>

</body>
</html>
