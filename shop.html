
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - INCLO</title>

<style>

/* 🔥 RESET */
html, body {
  height: 100%;
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:30px;
  overflow-x:hidden;
}

/* 🔥 KONTEN DI ATAS BACKGROUND */
.card, h2, h3, p, a{
  position:relative;
  z-index:1;
}

/* =========================
   🔥 LOGO WATERMARK UTAMA
========================= */
body::before{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:500px;
  height:500px;

  transform:translate(-50%,-50%);

  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;

  opacity:0.22;
  pointer-events:none;
  z-index:0;

  animation: floatLogo 3.5s ease-in-out infinite;
}

/* =========================
   🔥 GLOW PREMIUM
========================= */
body::after{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:520px;
  height:520px;

  transform:translate(-50%,-50%);

  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;

  opacity:0.10;
  filter: blur(18px);
  pointer-events:none;
  z-index:0;

  animation: glowPulse 3.5s ease-in-out infinite;
}

/* =========================
   🔥 ANIMASI FLOAT
========================= */
@keyframes floatLogo {
  0%   { transform:translate(-50%,-50%) scale(1.5); }
  50%  { transform:translate(-50%,-55%) scale(2.5); }
  100% { transform:translate(-50%,-50%) scale(1.5); }
}

/* =========================
   🔥 ANIMASI GLOW
========================= */
@keyframes glowPulse {
  0%   { opacity:0.05; }
  50%  { opacity:0.12; }
  100% { opacity:0.05; }
}

/* =========================
   🔥 SHOP UI
========================= */
.card{
  background:#222;
  padding:15px;
  border-radius:10px;
  max-width:300px;
  margin:auto;
}

img{
  width:100%;
  border-radius:10px;
}

a{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:#fff;
  color:#111;
  text-decoration:none;
  font-weight:bold;
}

</style>

</head>

<body>

<h2>SHOP</h2>

<div class="card">

  <img src="1777183184183.png">

  <h3>T-SHIRT FVCK STUPID POOR</h3>
  <p>Rp110.000</p>

  <!-- 🔥 FLOW -->
  <a href="shipping.html?product=T-SHIRT FVCK STUPID POOR&price=110000&img=1777183184183.png">
    ORDER
  </a>

</div>

</body>
</html>
