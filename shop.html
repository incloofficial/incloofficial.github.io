<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - INCLO</title>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:30px;
}

/* ================= GRID ================= */
.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

/* ================= CARD ================= */
.card{
  background:#222;
  padding:15px;
  border-radius:10px;
}

/* ================= IMAGE ================= */
img{
  width:100%;
  border-radius:10px;
}

/* ================= SIZE ================= */
.size{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:5px;
  border:none;
}

/* ================= BUTTON ================= */
button{
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#fff;
  color:#111;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

</style>
</head>

<body>

<h2>SHOP</h2>

<div class="products">

  <!-- PRODUK 1 -->
  <div class="card">

    <img src="1777183184183.png">

    <h3>T-SHIRT FVCK STUPID POOR</h3>
    <p>Rp110.000</p>

    <!-- SIZE -->
    <select class="size">
      <option value="">Pilih Size</option>
      <option value="S">S</option>
      <option value="M">M</option>
      <option value="L">L</option>
      <option value="XL">XL</option>
    </select>

    <!-- ORDER -->
    <button onclick="orderProduct(this)">
      ORDER
    </button>

  </div>

</div>

<script>
function orderProduct(btn){
  let card = btn.parentElement;
  let size = card.querySelector(".size").value;

  if(size === ""){
    alert("Pilih size dulu bro!");
    return;
  }

  let product = "T-SHIRT FVCK STUPID POOR";
  let price = "110000";
  let img = "1777183184183.png";

  window.location.href =
    `shipping.html?product=${product}&price=${price}&img=${img}&size=${size}`;
}
</script>

</body>
</html>
