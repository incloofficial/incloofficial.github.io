<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - INCLO</title>

<style>

/* ===== BASE ===== */
html, body {
  height: 100%;
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:30px;
  overflow-x:hidden;
}

/* ===== CONTENT ABOVE BG ===== */
.card, h1, h2, h3, p, a, input, select, button{
  position:relative;
  z-index:1;
}

/* ===== LOGO ===== */
body::before{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:500px;
  height:500px;
  transform:translate(-50%,-50%);
  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;
  opacity:0.22;
  pointer-events:none;
  z-index:0;
  animation: floatLogo 3.5s ease-in-out infinite;
}

/* ===== GLOW ===== */
body::after{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:520px;
  height:520px;
  transform:translate(-50%,-50%);
  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;
  opacity:0.10;
  filter: blur(18px);
  pointer-events:none;
  z-index:0;
  animation: glowPulse 3.5s ease-in-out infinite;
}

/* ===== ANIMATION ===== */
@keyframes floatLogo {
  0% {transform:translate(-50%,-50%) scale(1.75);}
  50% {transform:translate(-50%,-55%) scale(2.2);}
  100% {transform:translate(-50%,-50%) scale(1.75);}
}

@keyframes glowPulse {
  0% {opacity:0.05;}
  50% {opacity:0.12;}
  100% {opacity:0.05;}
}

/* ===== SHOP UI ===== */
.card{
  background:#222;
  padding:15px;
  border-radius:10px;
  max-width:300px;
  margin:auto;
}

/* ===== SLIDER ===== */
.slider img{
  width:100%;
  border-radius:10px;
  transition:0.3s;
}

.nav{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.nav button{
  padding:8px 15px;
  border:none;
  border-radius:5px;
  background:white;
  color:black;
  font-size:18px;
  cursor:pointer;
}

a{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:#fff;
  color:#111;
  text-decoration:none;
  font-weight:bold;
}

/* ===== SIZE ===== */
.size{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:5px;
  border:none;
}

</style>
</head>

<body>

<h2>SHOP</h2>

<div class="card">

  <!-- ===== SLIDER ===== -->
  <div class="slider">
    <img id="slide" src="front_eyeonhand.png">
  </div>

  <!-- ===== NAV ===== -->
  <div class="nav">
    <button onclick="prevSlide()">‹</button>
    <button onclick="nextSlide()">›</button>
  </div>

  <h3>T-SHIRT "EYE ON HAND"</h3>
  <p>Rp120.000</p>

  <!-- ===== SIZE ===== -->
  <select id="size" class="size">
    <option value="">Pilih Size</option>
    <option value="S">S</option>
    <option value="M">M</option>
    <option value="L">L</option>
    <option value="XL">XL</option>
  </select>

  <!-- ===== ORDER ===== -->
  <a href="#" onclick="orderNow()">
    ORDER
  </a>

</div>

<script>

/* ===== SLIDER ===== */

const images = [
  "front_eyeonhand.png",
  "back_eyeonhand.png"
];

let current = 0;

function showSlide(){

  document.getElementById("slide").src = images[current];

  if(current == 0){
    document.getElementById("photoLabel").innerText = "DEPAN";
  }

  if(current == 1){
    document.getElementById("photoLabel").innerText = "BELAKANG";
  }

}

function nextSlide(){

  current++;

  if(current >= images.length){
    current = 0;
  }

  showSlide();
}

function prevSlide(){

  current--;

  if(current < 0){
    current = images.length - 1;
  }

  showSlide();
}

/* ===== ORDER ===== */

function orderNow(){

  let size = document.getElementById("size").value;

  if(size === ""){
    alert("Pilih Size");
    return;
  }

  let product = "T-SHIRT EYE ON HAND";
  let price = "120.000";
  let img = image [front_eyeonhand.png];

  window.location.href =
  `shipping.html?product=${encodeURIComponent(product)}&price=${price}&img=${img}&size=${size}`;
}

</script>

</body>
</html>
