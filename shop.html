<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHOP - INCLO</title>

<style>

/* ===== BODY ===== */

body{
  margin:0;
  background:url("183598_dark.jpg") no-repeat center center fixed;
  background-size:cover;
  font-family:sans-serif;
  color:#fff;
  text-align:center;
  padding:30px;
  overflow-x:hidden;
  position:relative;
}

/* ===== OVERLAY ===== */

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:0;
}

/* ===== GLOW LOGO ===== */

body::after{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:500px;
  height:500px;
  transform:translate(-50%,-50%);
  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;
  opacity:0.08;
  filter:blur(18px);
  pointer-events:none;
  z-index:0;
  animation:floatLogo 4s ease-in-out infinite;
}

body *{
  position:relative;
  z-index:1;
}

/* ===== ANIMATION ===== */

@keyframes floatLogo{
  0%{
    transform:translate(-50%,-50%) scale(1.7);
  }

  50%{
    transform:translate(-50%,-53%) scale(2);
  }

  100%{
    transform:translate(-50%,-50%) scale(1.7);
  }
}

/* ===== CARD ===== */

.card{
  max-width:420px;
  margin:20px auto;
  background:rgba(15,15,15,0.82);
  border-radius:18px;
  padding:22px;
  backdrop-filter:blur(6px);
  box-shadow:0 10px 35px rgba(0,0,0,0.5);
}
/* ===== TITLE ===== */

h2{
  font-size:30px;
  letter-spacing:4px;
  margin-bottom:20px;
}

/* ===== PRE ORDER ===== */

.preorder{
  letter-spacing:2px;
  font-size:20px;
  color:#ffcc00;
  margin-bottom:14px;
  text-transform:uppercase;
  animation:pulseText 2.5s infinite;
}

@keyframes pulseText{
  0%{opacity:0.6;}
  50%{opacity:1;}
  100%{opacity:0.6;}
}

/* ===== SLIDER ===== */

.slider{
  width:100%;
  overflow:hidden;
  border-radius:14px;
}

.slider img{
  width:100%;
  border-radius:14px;
  transition:0.4s ease;
  object-fit:cover;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* ===== PHOTO LABEL ===== */

#photoLabel{
  margin-top:12px;
  font-size:13px;
  letter-spacing:2px;
  opacity:0.7;
}

/* ===== DOT ===== */

.nav{
  margin-top:14px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:rgba(255,255,255,0.4);
  display:inline-block;
  margin:0 4px;
  cursor:pointer;
  transition:0.3s;
}

.dot.active{
  background:#fff;
  transform:scale(1.3);
}

/* ===== PRODUCT ===== */

h3{
  margin-top:20px;
  letter-spacing:1px;
}

/* ===== SIZE ===== */

.size{
  width:100%;
  padding:13px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:#fff;
  outline:none;
  font-size:14px;
  box-sizing:border-box;
}

.size:focus{
  outline:2px solid #ffcc00;
  background:#222;
}

/* ===== BUTTON ===== */

button{
  width:100%;
  padding:14px;
  margin-top:18px;
  border:none;
  border-radius:12px;
  background:#ffcc00;
  color:#111;
  font-weight:800;
  letter-spacing:1px;
  cursor:pointer;
  transition:0.25s ease;
}

button:hover{
  transform:scale(1.03);
}

button:active{
  transform:scale(0.98);
}

</style>
</head>

<body>

<h2>SHOP</h2>

<div class="card">

  <p class="preorder">
    OPEN PRE-ORDER<br>
    25 Mei - 5 Juni
  </p>

  <!-- SLIDER -->
  <div class="slider">
    <img id="slideImage" src="front_eyeonhand.png">
  </div>

  <p id="photoLabel">DEPAN</p>

  <!-- DOT -->
  <div class="nav">
    <span class="dot" onclick="goSlide(0)"></span>
    <span class="dot" onclick="goSlide(1)"></span>
  </div>

  <h3>T-SHIRT "EYE ON HAND"</h3>

  <p>Rp120.000</p>

  <!-- SIZE -->
  <select id="size" class="size">
    <option value="">Pilih Size</option>
    <option value="S">S</option>
    <option value="M">M</option>
    <option value="L">L</option>
    <option value="XL">XL</option>
  </select>

  <!-- ORDER -->
  <button onclick="orderNow()">
    ORDER
  </button>

</div>

<script>

/* ===== ORDER ===== */

function orderNow(){

  let product = "T-SHIRT EYE ON HAND";
  let size = document.getElementById("size").value;

  if(size === ""){
    alert("Pilih size dulu");
    return;
  }

  window.location.href =
  `shipping.html?product=${encodeURIComponent(product)}&size=${encodeURIComponent(size)}`;
}

/* ===== SLIDER ===== */

const images = [
  "front_eyeonhand.png",
  "back_eyeonhand.png"
];

let current = 0;

function showSlide(){

  document.getElementById("slideImage").src = images[current];

  document.getElementById("photoLabel").innerText =
  current === 0 ? "DEPAN" : "BELAKANG";

  updateDots();
}

function goSlide(index){
  current = index;
  showSlide();
}

function updateDots(){

  let dots = document.querySelectorAll(".dot");

  dots.forEach((dot, i) => {

    dot.classList.remove("active");

    if(i === current){
      dot.classList.add("active");
    }

  });
}

window.onload = function(){
  showSlide();
};

</script>

</body>
</html>
