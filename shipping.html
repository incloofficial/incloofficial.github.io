<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shipping - INCLO</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */

body{
  margin:0;
  background:url("183598_dark.jpg") no-repeat center center fixed;
  background-size:cover;
  font-family:sans-serif;
  color:#fff;
  text-align:center;
  padding:30px;
  overflow-x:hidden;
  position:relative;
}

/* ===== OVERLAY ===== */

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:0;
}

/* ===== GLOW LOGO ===== */

body::after{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:500px;
  height:500px;
  transform:translate(-50%,-50%);
  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;
  opacity:0.08;
  filter:blur(18px);
  pointer-events:none;
  z-index:0;
  animation:floatLogo 4s ease-in-out infinite;
}

body *{
  position:relative;
  z-index:1;
}

/* ===== ANIMATION ===== */

@keyframes floatLogo{
  0%{
    transform:translate(-50%,-50%) scale(1.7);
  }

  50%{
    transform:translate(-50%,-53%) scale(2);
  }

  100%{
    transform:translate(-50%,-50%) scale(1.7);
  }
}

/* ===== TITLE ===== */

.title{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;
  letter-spacing:4px;
  margin-bottom:20px;
}

/* ===== STEPBAR ===== */

.stepbar{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:25px;
  flex-wrap:wrap;
}

.step{
  padding:8px 16px;
  border-radius:30px;
  background:rgba(255,255,255,0.08);
  opacity:0.5;
  font-size:13px;
}

.step.active{
  background:#ffcc00;
  color:#111;
  opacity:1;
  font-weight:bold;
}

/* ===== CARD ===== */

.card{
  max-width:420px;
  margin:18px auto;
  background:rgba(15,15,15,0.82);
  border-radius:18px;
  padding:22px;
  backdrop-filter:blur(6px);
  box-shadow:0 10px 35px rgba(0,0,0,0.5);
}

/* ===== SUMMARY ===== */

.summary p{
  margin:8px 0;
}

/* ===== FORM ===== */

input,
select{
  width:100%;
  padding:13px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:#fff;
  outline:none;
  font-size:14px;
  box-sizing:border-box;
}

input:focus,
select:focus{
  outline:2px solid #ffcc00;
  background:#222;
}

/* ===== BUTTON ===== */

button{
  width:100%;
  padding:14px;
  margin-top:18px;
  border:none;
  border-radius:12px;
  background:#ffcc00;
  color:#111;
  font-weight:800;
  letter-spacing:1px;
  cursor:pointer;
  transition:0.25s ease;
}

button:hover{
  transform:scale(1.03);
}

button:active{
  transform:scale(0.98);
}

hr{
  border:none;
  height:1px;
  background:rgba(255,255,255,0.1);
  margin:18px 0;
}

</style>
</head>

<body>

<h2 class="title">PENGIRIMAN</h2>

<div class="stepbar">
  <span class="step active">Cart</span>
  <span class="step active">Shipping</span>
  <span class="step">Payment</span>
</div>

<!-- ORDER SUMMARY -->

<div class="card summary">

  <h3>ORDER SUMMARY</h3>

  <p>Produk: <span id="pname">-</span></p>

  <p>Size: <span id="psize">-</span></p>

  <hr>

  <p><b>Total: Rp120.000</b></p>

</div>

<!-- FORM -->

<form onsubmit="goPayment(event)">

<div class="card">

  <h3>DETAIL PENGIRIMAN</h3>

  <input
    type="text"
    id="name"
    placeholder="Nama Lengkap"
    required
  >

  <input
    type="text"
    id="phone"
    placeholder="Nomor WhatsApp"
    required
  >

  <input
    type="text"
    id="address"
    placeholder="Alamat Lengkap"
    required
  >

  <select id="courier" required>

    <option value="">
      Pilih Kurir
    </option>

    <option>
      JNE
    </option>

    <option>
      J&T
    </option>

    <option>
      Shopee Express
    </option>

  </select>

  <button type="submit">
    LANJUT KE PEMBAYARAN
  </button>

</div>

</form>

<script>

/* ===== LOAD PRODUCT ===== */

window.onload = function(){

  const params = new URLSearchParams(window.location.search);

  let product = params.get("product") || "-";

  let size = params.get("size") || "-";

  document.getElementById("pname").innerText = product;

  document.getElementById("psize").innerText = size;

}

/* ===== GO PAYMENT ===== */

function goPayment(event){

  event.preventDefault();

  const params = new URLSearchParams(window.location.search);

  let product = params.get("product");

  let size = params.get("size");

  let name = document.getElementById("nama").value;

  let phone = document.getElementById("nomor").value;

  let address = document.getElementById("alamat").value;

  let courier = document.getElementById("ekspedisi").value;

  if(courier === ""){

    alert("Pilih kurir dulu");

    return;
  }

  window.location.href =
  `payment.html?product=${encodeURIComponent(product)}&size=${encodeURIComponent(size)}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&address=${encodeURIComponent(address)}&courier=${encodeURIComponent(courier)}`;

}

</script>

</body>
</html>
