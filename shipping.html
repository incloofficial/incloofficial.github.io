<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipping - INCLO</title>

<style>
/* ===== SAME BACKGROUND ===== */
html, body {
  height: 100%;
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:30px;
  overflow-x:hidden;
}

.card, h1, h2, h3, p, a, input, select, button{
  position:relative;
  z-index:1;
}

body::before, body::after{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:500px;
  height:500px;
  transform:translate(-50%,-50%);
  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;
  opacity:0.22;
  pointer-events:none;
  z-index:0;
  animation: floatLogo 3.5s ease-in-out infinite;
}

body::after{
  width:520px;
  height:520px;
  opacity:0.10;
  filter: blur(18px);
}

@keyframes floatLogo {
  0% {transform:translate(-50%,-50%) scale(1.75);}
  50% {transform:translate(-50%,-55%) scale(2.2);}
  100% {transform:translate(-50%,-50%) scale(1.75);}
}

/* ===== FORM ===== */
form{
  max-width:300px;
  margin:auto;
}

input, select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  background:#fff;
  color:#111;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>SHIPPING</h2>

<form action="payment.html">

  <input type="text" placeholder="Nama" required>
  <input type="text" placeholder="No HP" required>
  <input type="text" placeholder="Alamat" required>

  <select>
    <option>JNE</option>
    <option>J&T</option>
    <option>Shopee Express</option>
  </select>

  <button type="submit">LANJUT PAYMENT</button>

</form>

</body>
</html>
