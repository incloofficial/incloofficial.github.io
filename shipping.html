<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipping - INCLO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ===== SAME BACKGROUND ===== */
html, body {
  height: 100%;
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:30px;
  overflow-x:hidden;
}

.card, h1, h2, h3, p, a, input, select, button{
  position:relative;
  z-index:1;
}

body::before, body::after{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:500px;
  height:500px;
  transform:translate(-50%,-50%);
  background:url("file_000000003b68720ba18667b200b70917.png") no-repeat center;
  background-size:contain;
  opacity:0.22;
  pointer-events:none;
  z-index:0;
  animation: floatLogo 3.5s ease-in-out infinite;
}

body::after{
  width:520px;
  height:520px;
  opacity:0.10;
  filter: blur(18px);
}

@keyframes floatLogo {
  0% {transform:translate(-50%,-50%) scale(1.75);}
  50% {transform:translate(-50%,-55%) scale(2.2);}
  100% {transform:translate(-50%,-50%) scale(1.75);}
}

/* ===== FORM ===== */
form{
  max-width:340px;
  margin:auto;
}

input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:14px;
}

/* tombol lebih premium */
button{
  width:100%;
  padding:13px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  background:#ffcc00;
  color:#111;
  font-weight:800;
  letter-spacing:1px;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

button:hover{
  transform:scale(1.05);
}

button:active{
  transform:scale(0.98);
}
  
  input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:#fff;
  outline:none;
  font-size:14px;
  }
  
  input:focus, select:focus{
  outline:2px solid #ffcc00;
  background:#222;
  }
</style>
</head>

<body>

<h2 class="title">Checkout</h2>

<div class="stepbar">
  <span class="step active">Cart</span>
  <span class="step active">Shipping</span>
  <span class="step">Payment</span>
</div>

<div class="card summary">
  <h3>🛍 Order Summary</h3>

  <p>Product: <span id="pname">-</span></p>
  <p>Size: <span id="psize">-</span></p>

  <hr>

  <p><b>Total: Rp120.000</b></p>
</div>

<form onsubmit="goPayment(event)">

<div class="card">

  <h3>🚚 Shipping Details</h3>

  <input type="text" id="name" placeholder="Nama Lengkap" required>
  <input type="text" id="phone" placeholder="No WhatsApp" required>
  <input type="text" id="address" placeholder="Alamat Lengkap" required>

  <select id="courier" required>
    <option value="">Pilih Kurir</option>
    <option>JNE</option>
    <option>J&T</option>
    <option>Shopee Express</option>
  </select>

  <button type="submit">
    Continue to Payment
  </button>

</div>

</form>

  
<script>
window.onload = function(){

  const params = new URLSearchParams(window.location.search);

  let product = params.get("product") || "-";
  let size = params.get("size") || "-";

  document.getElementById("pname").innerText = product;
  document.getElementById("psize").innerText = size;

}
</script>
  
<script>

function goPayment(event){
  event.preventDefault();

  const params = new URLSearchParams(window.location.search);

  let product = params.get("product");
  let size = params.get("size");

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let courier = document.getElementById("courier").value;

  if(courier === ""){
    alert("Pilih kurir dulu");
    return;
  }

  window.location.href =
  `payment.html?product=${encodeURIComponent(product)}&size=${encodeURIComponent(size)}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&address=${encodeURIComponent(address)}&courier=${encodeURIComponent(courier)}`;
}

</script>
</body>
</html>
