<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INCLO OFFICIAL</title>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background-color: #111;
    color: #fff;
  }

  header {
    text-align: center;
    padding: 60px 20px 40px;
    background-color: #000;
  }

  .logo {
    max-width: 220px;
    margin: 0 auto 20px;
    display: block;
  }

  .header-hero {
    font-family: 'Anton', sans-serif;
    font-size: 80px;
  }

  .hero-subtitle {
    font-family: 'Anton', sans-serif;
    font-size: 28px;
    color: #C8102E;
    margin-bottom: 20px;
  }

  .btn {
    display: inline-block;
    padding: 12px 30px;
    background: #fff;
    color: #111;
    font-weight: 600;
    text-transform: uppercase;
    border-radius: 5px;
    text-decoration: none;
  }

  .products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 30px;
    padding: 50px 20px;
  }

  .product-card {
    background: #222;
    border-radius: 10px;
    overflow: hidden;
  }

  .slider { position: relative; }

  .product-card img {
    width: 100%;
  }

  .slide { display: none; }
  .slide.active { display: block; }

  .slider button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    padding: 10px;
    cursor: pointer;
  }

  .prev { left: 10px; }
  .next { right: 10px; }

  .product-info {
    padding: 15px;
  }

  .about, .contact {
    padding: 60px 20px;
    text-align: center;
  }

  footer {
    text-align: center;
    padding: 20px;
    color: #777;
  }

  @media(max-width:768px){
    .header-hero { font-size: 36px; }
  }
  </style>
</head>

<body>

<header>
  <img src="file_00000000556472069d10c0af39c85682.png" class="logo">
  <h1 class="header-hero">INCLO OFFICIAL</h1>
  <p class="hero-subtitle">MAKE OF INSULTS</p>
  <a href="#products" class="btn">SHOP COLLECTION</a>
</header>

<section class="products" id="products">

  <div class="product-card">
    <div class="slider">
      <img class="slide active" src="IMG_20260421_130716_877.png">
      <img class="slide" src="IMG_2.png">
      <img class="slide" src="IMG_3.png">

      <button class="prev" onclick="moveSlide(this, -1)">❮</button>
      <button class="next" onclick="moveSlide(this, 1)">❯</button>
    </div>

    <div class="product-info">
      <h3>T-SHIRT FVCK STUPID POOR</h3>
      <p>Rp110.000</p>
      <a href="https://wa.me/6289666846125" class="btn">ORDER</a>
    </div>
  </div>

</section>

<section class="about">
  <h2>Tentang INCLO</h2>
  <p>INCLO: Your Complete Clothing Destination</p>
</section>

<section class="contact">
  <h2>Kontak Kami</h2>
  <p>WhatsApp: 089666846125</p>
  <p>Instagram: incloofficial</p>
</section>

<footer>
  &copy; 2024 INCLO Official
</footer>

<script>
function moveSlide(btn, step){
  const slider = btn.parentElement;
  const slides = slider.querySelectorAll(".slide");

  let index = 0;
  slides.forEach((s,i)=>{
    if(s.classList.contains("active")) index = i;
    s.classList.remove("active");
  });

  index = (index + step + slides.length) % slides.length;
  slides[index].classList.add("active");
}
</script>

</body>
</html>
