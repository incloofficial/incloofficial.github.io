<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INCLO OFFICIAL</title>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #111;
      color: #fff;
      line-height: 1.6;
    }

    header {
      text-align: center;
      padding: 60px 20px 40px 20px;
      background-color: #000;
    }

    .logo {
      max-width: 220px;
      margin: 0 auto 20px auto;
      display: block;
    }

    .header-hero {
      font-family: 'Anton', sans-serif;
      font-size: 300px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 10px;
    }

    .hero-subtitle {
      font-family: 'Anton', sans-serif;
      font-size: 28px;
      color: #C8102E;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      background-color: #fff;
      color: #111;
      font-weight: 600;
      text-transform: uppercase;
      border-radius: 5px;
      text-decoration: none;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 30px;
      padding: 50px 20px;
    }

    .product-card {
      background-color: #222;
      border-radius: 10px;
      overflow: hidden;
    }

    .product-card img {
      width: 100%;
      display: block;
    }

    .product-info {
      padding: 15px;
    }

    .product-info h3 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .product-info p {
      color: #aaa;
      font-size: 14px;
    }

    .about, .contact {
      padding: 60px 20px;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #111;
      color: #777;
      font-size: 14px;
    }

    @media(max-width:768px){
      .header-hero { font-size: 40px; }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>

    <!-- LOGO FIX -->
    <img src="./file_00000000556472069d10c0af39c85682.png" class="logo">

    <h1 class="header-hero">INCLO OFFICIAL</h1>
    <p class="hero-subtitle">MAKE OF INSULTS</p>

    <a href="#products" class="btn">SHOP COLLECTION</a>
  </header>

  <!-- PRODUK -->
  <section class="products" id="products">

    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
      <div class="product-info">
        <h3>HOODIE INCLO</h3>
        <p>Rp250.000</p>
        <a href="https://wa.me/6289666846125" class="btn">ORDER</a>
      </div>
    </div>

    <div class="product-card">
      <img src="images/product2.jpg">
      <div class="product-info">
        <h3>T-SHIRT INCLO</h3>
        <p>Rp109.143</p>
        <a href="https://wa.me/6289666846125" class="btn">ORDER</a>
      </div>
    </div>

  </section>

  <!-- ABOUT -->
  <section class="about">
    <h2>Tentang INCLO</h2>
    <p>INCLO: Your Complete Clothing Destination</p>
  </section>

  <!-- CONTACT -->
  <section class="contact">
    <h2>Kontak Kami</h2>
    <p>WhatsApp: 089666846125</p>
    <p>Instagram: incloofficial</p>
  </section>

  <footer>
    &copy; 2024 INCLO Official
  </footer>

</body>
</html>
