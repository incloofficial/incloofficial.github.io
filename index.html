<!DOCTYPE html>
<html lang<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INCLO OFFICIAL</title>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background-color: #111;
    color: #fff;
  }

  header {
    text-align: center;
    padding: 60px 20px 40px;
    background-color: #000;
  }

  .logo {
    max-width: 220px;
    margin: 0 auto 20px;
    display: block;
  }

  .header-hero {
    font-family: 'Anton', sans-serif;
    font-size: 80px;
  }

  .hero-subtitle {
    font-family: 'Anton', sans-serif;
    font-size: 28px;
    color: #C8102E;
    margin-bottom: 20px;
  }

  .btn {
    display: inline-block;
    padding: 10px 25px;
    background: #fff;
    color: #111;
    border-radius: 5px;
    text-decoration: none;
  }

  .products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    padding: 40px 20px;
  }

  .product-card {
    background: #222;
    border-radius: 10px;
    overflow: hidden;
  }

  /* SLIDER */
  .slider {
    position: relative;
  }

  .slide {
    width: 100%;
    display: none;
  }

  .slide.active {
    display: block;
  }

  .slider button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    padding: 8px;
    cursor: pointer;
  }

  .prev { left: 5px; }
  .next { right: 5px; }

  .product-info {
    padding: 15px;
    text-align: center;
  }

  @media(max-width:768px){
    .header-hero { font-size: 36px; }
  }
  </style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h1 class="header-hero">INCLO OFFICIAL</h1>
  <p class="hero-subtitle">MAKE OF INSULTS</p>
  <a href="#products" class="btn">SHOP COLLECTION</a>
</header>

<section class="products" id="products">

  <!-- PRODUK 1 -->
  <div class="product-card">

    <div class="slider">
      <img class="slide active" src="img1.png">
      <img class="slide" src="img2.png">
      <img class="slide" src="img3.png">

      <button class="prev" onclick="moveSlide(this, -1)">❮</button>
      <button class="next" onclick="moveSlide(this, 1)">❯</button>
    </div>

    <div class="product-info">
      <h3>NAMA PRODUK</h3>
      <p>RpXXX.XXX</p>
      <a href="https://wa.me/6289666846125" class="btn">ORDER</a>
    </div>

  </div>

</section>

<script>
function moveSlide(btn, step){
  const slider = btn.parentElement;
  const slides = slider.querySelectorAll(".slide");

  let index = 0;
  slides.forEach((s,i)=>{
    if(s.classList.contains("active")) index = i;
    s.classList.remove("active");
  });

  index = (index + step + slides.length) % slides.length;
  slides[index].classList.add("active");
}
</script>

</body>
</html>
