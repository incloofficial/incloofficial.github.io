<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INCLO OFFICIAL</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#111;
  color:#fff;
}

/* HERO FULLSCREEN */
header{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;

  background:url("183598_dark.jpg") no-repeat center center;
  background-size:cover;
  position:relative;
}

.logo{
  max-width:180px;
  filter:drop-shadow(0 0 20px rgba(255,255,255,0.25));
}

@keyframes pulseGlow{
  0% {filter:drop-shadow(0 0 10px rgba(255,255,255,0.15));}
  50% {filter:drop-shadow(0 0 25px rgba(255,255,255,0.35));}
  100% {filter:drop-shadow(0 0 10px rgba(255,255,255,0.15));}
}
.header-hero{
  letter-spacing:3px;
  text-transform:uppercase;
}

.hero-subtitle{
  font-family:'Anton';
  color:#C8102E;
  margin:10px 0 30px;
}

.btn{
  background:#fff;
  color:#111;
  padding:12px 32px;
  text-decoration:none;
  font-weight:600;
  letter-spacing:1px;
  border-radius:8px;
  transition:.3s;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.btn:hover{
  background:#C8102E;
  color:#fff;
  transform:scale(1.08);
  box-shadow:0 12px 30px rgba(200,16,46,0.4);
}

  header::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  z-index:1;
  }

header::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.3),
    rgba(0,0,0,0.7)
  );
  z-index:2;
}
  header *{
  position:relative;
  z-index:3;
  }
  header{
  background-attachment:fixed;
  }
</style>
</head>

<body>

<header>
  <img src="logo_incloofficial.png" class="logo">

  <h1 class="header-hero">INCLO OFFICIAL</h1>
  <p class="hero-subtitle">MADE OF INSULTS</p>

  <a href="shop.html" class="btn">SHOP COLLECTION</a>
</header>

</body>
</html>
